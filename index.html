<!DOCTYPE html>
<html>
<head>

<title>Weather Prediction</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#74ebd5,#ACB6E5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:350px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.result{
    text-align:center;
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Weather Prediction</h1>

<form action="/predict" method="post">

<input type="text" name="humidity" placeholder="Humidity">

<input type="text" name="wind_speed" placeholder="Wind Speed (km/h)">

<input type="text" name="pressure" placeholder="Pressure (millibars)">

<input type="text" name="visibility" placeholder="Visibility (km)">

<button type="submit">Predict Temperature</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>
</html>
